name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
      make_latest:
        description: "Mark this GitHub release as latest"
        required: false
        default: "true"

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/den dist/den
          tar -C dist -czf den-${RELEASE_TAG}-${{ matrix.target }}.tar.gz den

      - name: Generate checksum
        run: shasum -a 256 den-${RELEASE_TAG}-${{ matrix.target }}.tar.gz > den-${RELEASE_TAG}-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: den-${{ matrix.target }}
          path: |
            den-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            den-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz.sha256

  publish-release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          make_latest: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.make_latest || 'true' }}
          files: artifacts/**/*
